<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>DonKari - Mon Site</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  text-align:center;
}

header{
  padding:60px 20px;
}

h1{
  font-size:60px;
}

p{
  font-size:20px;
}

button{
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:white;
  color:#2a5298;
  cursor:pointer;
}

button:hover{
  background:#ddd;
}

.section{
  background:white;
  color:black;
  padding:50px;
}

.card{
  background:#f4f4f4;
  padding:20px;
  margin:20px;
  border-radius:10px;
  display:inline-block;
  width:250px;
}
</style>
</head>

<body>

<header>
<h1>DonKari</h1>
<p>Bienvenue sur mon site GitHub</p>
<button>Voir mes projets</button>
</header>

<div class="section">
<h2>Mes projets</h2>

<div class="card">
<h3>Projet 1</h3>
<p>Mon premier projet web</p>
</div>

<div class="card">
<h3>Projet 2</h3>
<p>Un autre projet cool</p>
</div>

<div class="card">
<h3>Projet 3</h3>
<p>Encore un projet</p>
</div>

</div>

</body>
</html>
