<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DonKari</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(0,0,0,0.6);
backdrop-filter: blur(10px);
position:sticky;
top:0;
}

.logo{
font-weight:600;
font-size:20px;
}

nav ul{
display:flex;
list-style:none;
gap:30px;
}

nav a{
color:white;
text-decoration:none;
opacity:0.8;
}

nav a:hover{
opacity:1;
}

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:70px;
margin-bottom:20px;
background: linear-gradient(90deg,#ffffff,#aaa);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
font-size:22px;
opacity:0.8;
margin-bottom:40px;
}

.button{
position:relative;
padding:16px 40px;
border-radius:40px;
background:#ffffff;
color:black;
font-weight:600;
text-decoration:none;
overflow:hidden;
transition:transform 0.2s;
}

.button:hover{
transform:scale(1.05);
}

.button::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:120%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.8),transparent);
transition:all 0.6s;
}

.button:hover::before{
left:120%;
}

.section{
padding:100px 20px;
text-align:center;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:40px;
}

.card{
background:#1c1c1c;
padding:40px;
border-radius:20px;
width:260px;
transition:transform 0.3s, box-shadow 0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.card h3{
margin-bottom:10px;
}

.card p{
opacity:0.7;
}

footer{
padding:40px;
text-align:center;
opacity:0.5;
}

</style>
</head>

<body>

<nav>
<div class="logo">DonKari</div>

<ul>
<li><a href="#">Accueil</a></li>
<li><a href="#">Projets</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<section class="hero">
<h1>DonKari</h1>
<p>Créateur de projets web</p>

<a class="button" href="#">Voir mes projets</a>
</section>

<section class="section">

<h2>Mes projets</h2>

<div class="cards">

<div class="card">
<h3>Projet 1</h3>
<p>Mon premier projet web</p>
</div>

<div class="card">
<h3>Projet 2</h3>
<p>Une application cool</p>
</div>

<div class="card">
<h3>Projet 3</h3>
<p>Un autre projet stylé</p>
</div>

</div>

</section>

<footer>
© 2026 DonKari
</footer>

</body>
</html>
