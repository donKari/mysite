<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Galerie Pro – DonKari</title>
  
  <!-- Feather Icons -->
  <script src="https://unpkg.com/feather-icons"></script>
  
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #151515;
      --text: #f0f0f0;
      --text-soft: #aaaaaa;
      --accent: #6366f1;
      --accent-dark: #4f46e5;
      --danger: #ef4444;
      --radius: 16px;
      --shadow: 0 12px 32px rgba(0,0,0,0.5);
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #1e293b;
      --text-soft: #64748b;
      --accent: #6366f1;
      --accent-dark: #4f46e5;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      transition: background 0.4s ease, color 0.4s ease;
    }

    header {
      padding: 1.2rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15,15,15,0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background 0.4s ease, border-color 0.4s ease;
    }

    [data-theme="light"] header {
      background: rgba(255,255,255,0.75);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    h1 { font-size: 2.1rem; font-weight: 700; letter-spacing: -0.5px; }

    .header-right { display: flex; gap: 12px; align-items: center; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow);
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 16px 40px rgba(0,0,0,0.3); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-danger { background: var(--danger); color: white; }

    #dropzone {
      margin: 2.5rem auto;
      width: 92%;
      max-width: 860px;
      padding: 5rem 1.5rem;
      border: 2px dashed var(--text-soft);
      border-radius: var(--radius);
      text-align: center;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(4px);
      cursor: pointer;
    }

    #dropzone:hover,
    #dropzone.dragover {
      border-color: var(--accent);
      background: rgba(99,102,241,0.08);
      transform: scale(1.008);
    }

    #dropzone p { margin: 1rem 0; color: var(--text-soft); font-size: 1.1rem; }

    .gallery {
      columns: 320px 4;
      column-gap: 1.5rem;
      padding: 1rem 5% 3rem;
      max-width: 1800px;
      margin: 0 auto;
    }

    .image-card {
      break-inside: avoid;
      margin-bottom: 1.5rem;
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      box-shadow: var(--shadow);
      transition: all 0.28s ease;
    }

    .image-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 48px rgba(0,0,0,0.35);
    }

    .image-card img {
      width: 100%;
      display: block;
      cursor: zoom-in;
      transition: transform 0.4s ease;
    }

    .image-card:hover img { transform: scale(1.06); }

    .delete-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      opacity: 0;
      transform: scale(0.7);
      transition: all 0.25s ease;
    }

    .image-card:hover .delete-btn { opacity: 1; transform: scale(1); }

    #viewer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.94);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(8px);
    }

    #viewer.active { display: flex; }

    #viewer img {
      max-width: 94vw;
      max-height: 94vh;
      border-radius: 20px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8);
      object-fit: contain;
    }

    .viewer-controls {
      position: absolute;
      bottom: 30px;
      right: 30px;
      display: flex;
      gap: 16px;
    }

    @media (max-width: 900px) { .gallery { columns: 2; } }
    @media (max-width: 600px) {
      .gallery { columns: 1; padding: 1rem 4%; }
      header { padding: 1rem 6%; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<header>
  <h1 id="galleryTitle">Galerie Pro</h1>
  <div class="header-right">
    <button class="btn" id="clearAll"><i data-feather="trash-2"></i> Tout supprimer</button>
    <button class="btn btn-primary" id="toggleTheme"><i data-feather="moon"></i> Mode clair</button>
  </div>
</header>

<div id="dropzone">
  <i data-feather="image" style="width:64px;height:64px;color:var(--text-soft);margin-bottom:1rem;"></i>
  <p>Glisse tes images ici ou clique pour uploader</p>
  <input type="file" id="fileInput" multiple accept="image/*" style="display:none;">
</div>

<div class="gallery" id="gallery"></div>

<div id="viewer">
  <img id="viewerImg" alt="Image agrandie">
  <div class="viewer-controls">
    <button class="btn btn-primary" id="downloadBtn">
      <i data-feather="download"></i> Télécharger
    </button>
    <button class="btn" onclick="closeViewer()">
      <i data-feather="x"></i> Fermer
    </button>
  </div>
</div>

<script>
const gallery = document.getElementById("gallery");
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const viewer = document.getElementById("viewer");
const viewerImg = document.getElementById("viewerImg");
const downloadBtn = document.getElementById("downloadBtn");
const toggleTheme = document.getElementById("toggleTheme");
const clearAllBtn = document.getElementById("clearAll");

let images = JSON.parse(localStorage.getItem("donkari_gallery")) || [];

function save() { localStorage.setItem("donkari_gallery", JSON.stringify(images)); }

function render() {
  gallery.innerHTML = "";
  images.forEach((src, i) => {
    const card = document.createElement("div");
    card.className = "image-card";

    const img = document.createElement("img");
    img.src = src;
    img.alt = `Photo galerie ${i+1}`;
    img.loading = "lazy";
    img.onclick = () => openViewer(src);

    const del = document.createElement("button");
    del.className = "delete-btn";
    del.innerHTML = "×";
    del.setAttribute("aria-label", "Supprimer cette image");
    del.onclick = (e) => {
      e.stopPropagation();
      if(confirm("Supprimer cette image ?")){
        images.splice(i,1);
        save();
        render();
      }
    };

    card.append(img, del);
    gallery.appendChild(card);
  });
}

function addFiles(files){
  let added = 0;
  dropzone.style.pointerEvents = "none";

  Array.from(files).forEach(file => {
    if(!file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = e => {
      images.push(e.target.result);
      added++;
      if(added === files.length || added > 20){
        save();
        render();
        dropzone.style.pointerEvents = "auto";
      }
    };
    reader.readAsDataURL(file);
  });
}

// ─── Events ────────────────────────────
dropzone.onclick = () => fileInput.click();
dropzone.ondragover = e => { e.preventDefault(); dropzone.classList.add("dragover"); };
dropzone.ondragleave = () => dropzone.classList.remove("dragover");
dropzone.ondrop = e => {
  e.preventDefault();
  dropzone.classList.remove("dragover");
  addFiles(e.dataTransfer.files);
};

fileInput.onchange = e => addFiles(e.target.files);

function openViewer(src){ viewerImg.src = src; viewer.classList.add("active"); }
function closeViewer(){ viewer.classList.remove("active"); }

viewer.onclick = e => { if(e.target === viewer || e.target === viewerImg.parentElement) closeViewer(); };

downloadBtn.onclick = () => {
  const a = document.createElement("a");
  a.href = viewerImg.src;
  a.download = "photo-donkari.jpg";
  a.click();
};

// Theme
let isDark = localStorage.getItem("theme") !== "light";
document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");

toggleTheme.onclick = () => {
  isDark = !isDark;
  document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  toggleTheme.innerHTML = isDark
    ? '<i data-feather="sun"></i> Mode clair'
    : '<i data-feather="moon"></i> Mode sombre';
};

// Clear all
clearAllBtn.onclick = () => {
  if(images.length === 0) return;
  if(confirm(`Supprimer les ${images.length} images ?`)){
    images = [];
    save();
    render();
  }
};

// Init
render();
feather.replace();
toggleTheme.innerHTML = isDark
  ? '<i data-feather="sun"></i> Mode clair'
  : '<i data-feather="moon"></i> Mode sombre';
</script>
</body>
</html>
